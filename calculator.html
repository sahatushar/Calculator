<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
    <link rel="shortcut icon" href="image.png" type="image/x-icon">
</head>
<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="calculator">
        <div class="display">
            <div class="previous">
                0
            </div>
            <div class="current" id="display">
                0
            </div>
        </div>

        <div class="buttons">

            <!-- Row 1 -->

            <button class="btn" id="acbtn">
                AC
            </button>

            <button class="btn">
                %
            </button>

            <button class="btn">
                DEL
            </button>

            <button class="btn operator">
                /
            </button>

            <!-- Row 2 -->

            <button class="btn">
                7
            </button>

            <button class="btn">
                8
            </button>

            <button class="btn">
                9
            </button>

            <button class="btn operator">
                *
            </button>

            <!-- Row 3 -->

            <button class="btn">
                4
            </button>

            <button class="btn">
                5
            </button>

            <button class="btn">
                6
            </button>

            <button class="btn operator">
                -
            </button>

            <!-- Row 4 -->

            <button class="btn">
                1
            </button>

            <button class="btn">
                2
            </button>

            <button class="btn">
                3
            </button>

            <button class="btn operator">
                +
            </button>

            <!-- Row 5 -->

            <button class="btn zero">
                0
            </button>

            <button class="btn">
                00
            </button>

            <button class="btn">
                .
            </button>

            <button class="btn" id="eqbtn">
                =
            </button>

        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
